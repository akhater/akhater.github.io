<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftRead</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #0f0f0f;
            --bg2: #1a1a1a;
            --bg3: #242424;
            --fg: #e8e8e8;
            --fg2: #9a9a9a;
            --accent: #6366f1;
            --accent2: #818cf8;
            --border: #2e2e2e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: var(--fg); line-height: 1.7; min-height: 100vh;
        }
        header {
            border-bottom: 1px solid var(--border); position: sticky; top: 0;
            background: var(--bg); z-index: 10;
        }
        .header-inner {
            max-width: 800px; margin: 0 auto; padding: 0 20px;
            display: flex; align-items: center; justify-content: space-between; height: 52px;
        }
        .logo { display: flex; align-items: center; gap: 8px; font-size: 18px; font-weight: 700; }
        .logo svg { color: var(--accent); }
        .tabs { display: flex; gap: 2px; }
        .tab {
            padding: 8px 18px; font-size: 13px; font-weight: 500;
            background: none; border: none; color: var(--fg2); cursor: pointer;
            border-bottom: 2px solid transparent; transition: all 0.15s;
        }
        .tab:hover { color: var(--fg); }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
        main { max-width: 800px; margin: 0 auto; padding: 20px; }
        .panel { display: none; animation: fadeIn 0.2s ease; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        /* Drop zone */
        .dropzone {
            border: 2px dashed var(--border); border-radius: 12px; padding: 36px 20px;
            text-align: center; cursor: pointer; background: var(--bg2); transition: all 0.2s;
        }
        .dropzone.dragover { border-color: var(--accent); background: rgba(99,102,241,0.08); }
        .dropzone:hover { border-color: #444; }
        .divider {
            display: flex; align-items: center; gap: 14px; margin: 20px 0;
        }
        .divider span { font-size: 11px; color: var(--fg2); text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        /* Inputs */
        .url-row { display: flex; gap: 8px; }
        .url-input, .textarea {
            width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
            color: var(--fg); padding: 12px; font-size: 14px; outline: none; transition: border-color 0.15s;
        }
        .url-input:focus, .textarea:focus { border-color: var(--accent); }
        .textarea { min-height: 120px; resize: vertical; font-family: inherit; line-height: 1.6; }

        /* Buttons */
        .btn {
            padding: 10px 20px; border-radius: 8px; border: none;
            font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent2); }
        .btn-ghost { background: var(--bg3); color: var(--fg); border: 1px solid var(--border); }
        .btn-ghost:hover { background: #2e2e2e; }
        .btn-icon {
            width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border);
            background: var(--bg3); color: var(--fg); cursor: pointer; font-size: 16px;
            display: inline-flex; align-items: center; justify-content: center; transition: all 0.15s;
        }
        .btn-icon:hover { background: #2e2e2e; border-color: #444; }
        .center { text-align: center; margin-top: 16px; }

        /* Stats pills */
        .stats { display: flex; gap: 6px; flex-wrap: wrap; margin: 16px 0; }
        .pill {
            display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px;
            border-radius: 16px; background: var(--bg3); font-size: 12px; color: var(--fg2);
        }

        /* Slider */
        input[type=range] {
            -webkit-appearance: none; width: 100%; height: 4px; background: var(--bg3);
            border-radius: 2px; outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
            background: var(--accent); cursor: pointer; border: 2px solid var(--bg);
        }
        .slider-row {
            padding: 12px 16px; background: var(--bg2); border-radius: 10px; border: 1px solid var(--border);
        }
        .slider-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .slider-label { font-size: 12px; color: var(--fg2); }
        .slider-val { font-size: 13px; font-weight: 600; color: var(--accent); }

        /* Reading content */
        .content {
            font-size: 19px; line-height: 1.85; max-width: 640px; margin: 0 auto; padding: 20px 0;
        }
        .content p { margin-bottom: 1em; }
        .content h1, .content h2, .content h3 { margin: 1.4em 0 0.5em; font-weight: 700; }
        .content h1 { font-size: 1.6em; }
        .content h2 { font-size: 1.3em; }
        .content h3 { font-size: 1.15em; }
        .content code { background: var(--bg3); padding: 1px 5px; border-radius: 4px; font-size: 0.88em; }
        .content blockquote { border-left: 3px solid var(--accent); padding-left: 14px; color: var(--fg2); margin: 1em 0; }
        .content ul, .content ol { padding-left: 1.5em; margin-bottom: 1em; }

        /* RSVP */
        .rsvp-stage { display: flex; flex-direction: column; align-items: center; padding: 30px 0; }
        .rsvp-focus {
            position: fixed; inset: 0; z-index: 100;
            background: var(--bg);
            display: flex; flex-direction: column;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .rsvp-focus.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .rsvp-focus-glass {
            flex: 1; display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }
        .rsvp-focus-lines { position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; }
        .focus-line {
            position: absolute; left: 0; width: 1px;
            background: linear-gradient(to bottom, transparent, var(--accent), transparent);
            opacity: 0.3;
        }
        .focus-line.top { top: 0; height: 60px; }
        .focus-line.bottom { bottom: 0; height: 60px; }
        .rsvp-focus-word {
            position: relative; width: 100%; height: 1.2em;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            font-size: clamp(3rem, 8vw, 5.5rem); font-weight: 400; line-height: 1;
            white-space: nowrap; text-rendering: geometricPrecision;
            -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
        }
        .rsvp-orp {
            position: absolute; left: 50%; transform: translateX(-50%);
            color: #a78bfa; font-weight: 700; text-shadow: 0 0 20px rgba(167,139,250,0.4);
            z-index: 2;
        }
        .rsvp-before {
            position: absolute; left: 50%; transform: translateX(calc(-100% - 0.5ch));
            color: #fff; text-align: right;
        }
        .rsvp-after {
            position: absolute; left: calc(50% + 0.5ch);
            color: #fff; text-align: left;
        }
        .rsvp-placeholder {
            color: #333; font-size: 2rem; font-weight: 300;
            font-family: system-ui, sans-serif; position: absolute;
            left: 50%; transform: translateX(-50%);
        }
        .rsvp-focus-bar {
            padding: 12px 20px 20px; display: flex; flex-direction: column; gap: 10px;
            align-items: center; background: rgba(15,15,15,0.95);
            border-top: 1px solid var(--border);
        }
        .rsvp-focus-progress { width: 100%; max-width: 500px; height: 2px; background: var(--bg3); border-radius: 1px; overflow: hidden; }
        .rsvp-focus-fill { height: 100%; background: var(--accent); border-radius: 1px; transition: width 0.15s linear; }
        .rsvp-focus-controls { display: flex; align-items: center; gap: 8px; }
        .fbtn {
            width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border);
            background: var(--bg3); color: var(--fg); cursor: pointer; font-size: 14px;
            display: inline-flex; align-items: center; justify-content: center; transition: all 0.15s;
        }
        .fbtn:hover { background: #2e2e2e; border-color: #444; }
        .rsvp-focus-wpm {
            font-size: 13px; font-weight: 600; color: var(--accent);
            margin-left: 8px; min-width: 50px; text-align: right;
        }
        .color-row { display: flex; gap: 6px; align-items: center; }
        .color-swatch {
            width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent;
            cursor: pointer; transition: border-color 0.15s, transform 0.15s;
        }
        .color-swatch:hover { transform: scale(1.15); border-color: #555; }
        .color-swatch.active { border-color: #fff; }


        /* Toast */
        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px);
            padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 500;
            z-index: 100; opacity: 0; pointer-events: none; transition: all 0.25s;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.err { background: #7f1d1d; color: #fca5a5; }
        .toast.ok { background: #064e3b; color: #6ee7b7; }

        @media (max-width: 640px) {
            .rsvp-word { font-size: 32px; }
            .content { font-size: 17px; }
        }
    </style>
</head>
<body>
<header>
    <div class="header-inner">
        <div class="logo">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            SwiftRead
        </div>
        <div class="tabs">
            <button class="tab active" data-mode="read" onclick="switchMode('read')">Read</button>
            <button class="tab" data-mode="bionic" onclick="switchMode('bionic')">Bionic</button>
            <button class="tab" data-mode="rsvp" onclick="switchMode('rsvp')">RSVP</button>
        </div>
    </div>
</header>
<main>
    <!-- INPUT -->
    <div id="input-panel" class="panel active">
        <div class="dropzone" id="dropzone" onclick="document.getElementById('file-input').click()">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="display:block;margin:0 auto 10px;color:var(--fg2)"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <div style="font-size:14px;font-weight:500">Drop a file or click to upload</div>
            <div style="font-size:12px;color:var(--fg2)">.txt, .md, and other text files</div>
        </div>
        <input type="file" id="file-input" accept=".txt,.md,.text,.markdown,.mdown,.mkd" style="display:none">
        <div class="divider"><span>or enter a URL</span></div>
        <div class="url-row">
            <input type="url" class="url-input" id="url-input" placeholder="https://example.com/article">
            <button class="btn btn-primary" onclick="fetchURL()">Fetch</button>
        </div>
        <div class="divider"><span>or paste text</span></div>
        <textarea class="textarea" id="paste-input" placeholder="Paste your text or markdown here..."></textarea>
        <div class="center"><button class="btn btn-primary" onclick="loadText()" style="padding:12px 28px;font-size:14px">Start Reading</button></div>
    </div>

    <!-- READ MODE -->
    <div id="read-panel" class="panel">
        <div class="stats" id="read-stats"></div>
        <div class="content" id="read-output"></div>
        <div class="center"><button class="btn btn-ghost" onclick="resetApp()">New Text</button></div>
    </div>

    <!-- BIONIC MODE -->
    <div id="bionic-panel" class="panel">
        <div class="stats" id="bionic-stats"></div>
        <div class="slider-row" style="margin-bottom:16px">
            <div class="slider-header">
                <span class="slider-label">Fixation Strength</span>
                <span class="slider-val" id="fixation-val">50%</span>
            </div>
            <input type="range" id="fixation-slider" min="30" max="70" value="50" step="1" oninput="updateFixation(this.value)">
        </div>
        <div class="content" id="bionic-output"></div>
        <div class="center"><button class="btn btn-ghost" onclick="resetApp()">New Text</button></div>
    </div>

    <!-- RSVP MODE -->
    <div id="rsvp-panel" class="panel">
        <!-- RSVP Setup (before play) -->
        <div id="rsvp-setup">
            <div class="stats" id="rsvp-stats"></div>
            <div class="rsvp-sliders">
                <div class="slider-row">
                    <div class="slider-header">
                        <span class="slider-label">Start Speed</span>
                        <span class="slider-val" id="start-speed-val">300 WPM</span>
                    </div>
                    <input type="range" id="start-speed-slider" min="100" max="800" value="300" step="10" oninput="updateStartSpeed(this.value)">
                </div>
                <div class="slider-row">
                    <div class="slider-header">
                        <span class="slider-label">Target Speed</span>
                        <span class="slider-val" id="target-speed-val">600 WPM</span>
                    </div>
                    <input type="range" id="target-speed-slider" min="200" max="1000" value="600" step="10" oninput="updateTargetSpeed(this.value)">
                </div>
                <div class="slider-row">
                    <div class="slider-header">
                        <span class="slider-label">Ramp Duration</span>
                        <span class="slider-val" id="ramp-val">45s</span>
                    </div>
                    <input type="range" id="ramp-slider" min="10" max="120" value="45" step="5" oninput="updateRamp(this.value)">
                </div>
                <div class="slider-row">
                    <div class="slider-header">
                        <span class="slider-label">Focus Color</span>
                        <span class="slider-val" id="focus-color-val" style="color:#a78bfa">#a78bfa</span>
                    </div>
                    <div class="color-row">
                        <button class="color-swatch" style="background:#ff4444" onclick="setOrpColor('#ff4444')" title="Red"></button>
                        <button class="color-swatch" style="background:#a78bfa" onclick="setOrpColor('#a78bfa')" title="Purple"></button>
                        <button class="color-swatch" style="background:#60a5fa" onclick="setOrpColor('#60a5fa')" title="Blue"></button>
                        <button class="color-swatch" style="background:#34d399" onclick="setOrpColor('#34d399')" title="Green"></button>
                        <button class="color-swatch" style="background:#fbbf24" onclick="setOrpColor('#fbbf24')" title="Gold"></button>
                        <button class="color-swatch" style="background:#f472b6" onclick="setOrpColor('#f472b6')" title="Pink"></button>
                        <input type="color" id="focus-color-picker" value="#a78bfa" onchange="setOrpColor(this.value)" style="width:28px;height:28px;border:none;background:none;cursor:pointer">
                    </div>
                </div>
            </div>
            <div class="center" style="margin-top:20px">
                <button class="btn btn-primary" onclick="rsvpPlay()" style="padding:14px 36px;font-size:16px">&#9654; Start Reading</button>
            </div>
        </div>
        <!-- RSVP Focus Mode (fullscreen, after play) -->
        <div id="rsvp-focus" class="rsvp-focus hidden">
            <div class="rsvp-focus-glass">
                <div class="rsvp-focus-lines">
                    <div class="focus-line top"></div>
                    <div class="focus-line bottom"></div>
                </div>
                <div class="rsvp-focus-word">
                    <span class="rsvp-before" id="rsvp-before"></span>
                    <span class="rsvp-orp" id="rsvp-orp"></span>
                    <span class="rsvp-after" id="rsvp-after"></span>
                </div>
            </div>
            <div class="rsvp-focus-bar">
                <div class="rsvp-focus-progress"><div class="rsvp-focus-fill" id="rsvp-focus-fill"></div></div>
                <div class="rsvp-focus-controls">
                    <button class="fbtn" onclick="rsvpToggle()" id="fplay-btn">&#10074;&#10074;</button>
                    <button class="fbtn" onclick="rsvpJump(-10)">&#8592;</button>
                    <button class="fbtn" onclick="rsvpJump(10)">&#8594;</button>
                    <button class="fbtn" onclick="exitFocusMode()">&#10005;</button>
                    <span class="rsvp-focus-wpm" id="rsvp-focus-wpm">300</span>
                </div>
            </div>
        </div>
    </div>
</main>
<div class="toast" id="toast"></div>

<script>
    // State
    let rawText = '', renderedHTML = '';
    let mode = 'read';
    let rsvpWords = [], rsvpIdx = 0, rsvpPlaying = false, rsvpTimer = null;
    let fixation = 50;
    let startSpeed = 300, targetSpeed = 600, rampSeconds = 45;
    let rsvpStartTime = null;
    let orpColor = '#a78bfa';

    // Marked config
    marked.setOptions({ breaks: true, gfm: true });

    // Mode switching
    function switchMode(m) {
        if (m !== 'read' && !rawText) { toast('Load text first', 'err'); return; }
        if (mode === 'rsvp') exitFocusMode();
        mode = m;
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.mode === m));
        showPanel(m === 'read' ? (rawText ? 'read' : 'input') : m);
        if (m === 'bionic') renderBionic();
        if (m === 'rsvp') initRSVP();
    }
    function showPanel(name) {
        ['input', 'read', 'bionic', 'rsvp'].forEach(p => {
            document.getElementById(p + '-panel').classList.toggle('active', p === name);
        });
    }

    // Text loading
    function loadText() {
        const t = document.getElementById('paste-input').value.trim();
        if (!t) { toast('Please load some text first', 'err'); return; }
        rawText = t;
        processText();
    }
    function processText() {
        renderedHTML = marked.parse(rawText);
        const div = document.createElement('div'); div.innerHTML = renderedHTML;
        const plain = div.textContent || '';
        const wc = plain.trim().split(/\s+/).filter(w => w.length).length;
        const rt = Math.max(1, Math.round(wc / 230));
        const statsHTML = '<span class="pill">' + wc + ' words</span><span class="pill">' + rt + ' min read</span>';
        ['read', 'bionic', 'rsvp'].forEach(m => document.getElementById(m + '-stats').innerHTML = statsHTML);
        document.getElementById('read-output').innerHTML = renderedHTML;
        mode = 'read';
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.mode === 'read'));
        showPanel('read');
        toast('Loaded ' + wc + ' words', 'ok');
    }

    // File upload
    const dz = document.getElementById('dropzone'), fi = document.getElementById('file-input');
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
    dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('dragover'); if (e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0]); });
    fi.addEventListener('change', e => { if (e.target.files[0]) readFile(e.target.files[0]); });
    function readFile(f) {
        const r = new FileReader();
        r.onload = e => { rawText = e.target.result; document.getElementById('paste-input').value = rawText; processText(); };
        r.onerror = () => toast('Could not read file', 'err');
        r.readAsText(f);
    }

    // URL fetch
    async function fetchURL() {
        const url = document.getElementById('url-input').value.trim();
        if (!url) { toast('Enter a URL', 'err'); return; }
        toast('Fetching...', 'ok');
        const proxies = [
            u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
            u => 'https://corsproxy.io/?' + encodeURIComponent(u),
        ];
        for (const p of proxies) {
            try {
                const r = await fetch(p(url));
                if (r.ok) {
                    const html = await r.text();
                    const doc = new DOMParser().parseFromString(html, 'text/html');
                    doc.querySelectorAll('script,style,nav,header,footer,aside').forEach(el => el.remove());
                    const el = doc.querySelector('article') || doc.querySelector('main') || doc.body;
                    rawText = (el.innerText || el.textContent || '').replace(/\n{3,}/g, '\n\n').trim();
                    document.getElementById('paste-input').value = rawText;
                    processText(); return;
                }
            } catch(e) { continue; }
        }
        toast('Could not fetch URL — paste text instead', 'err');
    }

    // Bionic reading
    function bionicize(word, fix) {
        const lead = (word.match(/^([^a-zA-Z0-9]*)/) || ['',''])[1];
        const trail = (word.match(/([^a-zA-Z0-9]*)$/) || ['',''])[1];
        const core = word.slice(lead.length, word.length - trail.length);
        if (!core.length) return word;
        const boldLen = Math.max(1, Math.ceil(core.length * fix / 100));
        return lead + '<strong>' + core.slice(0, boldLen) + '</strong>' + core.slice(boldLen) + trail;
    }
    function renderBionic() {
        if (!renderedHTML) return;
        const container = document.createElement('div');
        container.innerHTML = renderedHTML;
        const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT);
        const nodes = []; let n;
        while (n = walker.nextNode()) nodes.push(n);
        nodes.forEach(node => {
            if (!node.textContent.trim()) return;
            const span = document.createElement('span');
            span.innerHTML = node.textContent.replace(/\b(\S+?)\b/g, m => bionicize(m, fixation));
            node.parentNode.replaceChild(span, node);
        });
        document.getElementById('bionic-output').innerHTML = container.innerHTML;
    }
    function updateFixation(v) {
        fixation = parseInt(v);
        document.getElementById('fixation-val').textContent = v + '%';
        if (rawText) renderBionic();
    }

    // RSVP
    function initRSVP() {
        const div = document.createElement('div'); div.innerHTML = renderedHTML || rawText;
        rsvpWords = (div.textContent || '').trim().split(/\s+/).filter(w => w.length);
        if (!rsvpWords.length) { toast('No words to display', 'err'); return; }
        rsvpIdx = 0;
        // Show setup panel
        document.getElementById('rsvp-setup').style.display = 'block';
        document.getElementById('rsvp-focus').classList.add('hidden');
    }
    function showWord(word) {
        const beforeEl = document.getElementById('rsvp-before');
        const orpEl = document.getElementById('rsvp-orp');
        const afterEl = document.getElementById('rsvp-after');
        if (!word) { beforeEl.textContent = ''; orpEl.textContent = ''; afterEl.textContent = ''; return; }
        // ORP: leftmost char for short words, ~1/3 for longer
        const len = word.length;
        let orp;
        if (len <= 1) orp = 0;
        else if (len <= 3) orp = 0;
        else if (len <= 5) orp = 1;
        else if (len <= 9) orp = 2;
        else orp = 3;
        beforeEl.textContent = word.slice(0, orp);
        orpEl.textContent = word[orp] || '';
        afterEl.textContent = word.slice(orp + 1);
    }
    function rsvpToggle() { rsvpPlaying ? rsvpPause() : rsvpPlay(); }
    function rsvpPlay() {
        if (!rsvpWords.length) { toast('Load text first', 'err'); return; }
        if (rsvpIdx >= rsvpWords.length) rsvpIdx = 0;
        // Enter focus mode
        document.getElementById('rsvp-setup').style.display = 'none';
        document.getElementById('rsvp-focus').classList.remove('hidden');
        rsvpPlaying = true;
        rsvpStartTime = Date.now();
        document.getElementById('fplay-btn').innerHTML = '&#10074;&#10074;';
        showWord(rsvpWords[rsvpIdx]);
        updateProgress();
        rsvpTick();
    }
    function rsvpPause() {
        rsvpPlaying = false;
        document.getElementById('fplay-btn').innerHTML = '&#9654;';
        clearTimeout(rsvpTimer); rsvpTimer = null;
    }
    function exitFocusMode() {
        rsvpPause(); rsvpIdx = 0; rsvpStartTime = null;
        document.getElementById('rsvp-focus').classList.add('hidden');
        document.getElementById('rsvp-setup').style.display = 'block';
        showWord(rsvpWords[0]);
        updateProgress();
    }
    function rsvpJump(d) {
        rsvpIdx = Math.max(0, Math.min(rsvpWords.length - 1, rsvpIdx + d));
        showWord(rsvpWords[rsvpIdx]); updateProgress();
    }
    function rsvpTick() {
        if (!rsvpPlaying) return;
        if (rsvpIdx >= rsvpWords.length) {
            rsvpPause(); toast('Finished!', 'ok'); return;
        }
        showWord(rsvpWords[rsvpIdx]); updateProgress();
        rsvpIdx++;
        // Progressive speed: interpolate from startSpeed to targetSpeed over rampSeconds
        let spd = targetSpeed;
        if (rsvpStartTime) {
            const elapsedSec = (Date.now() - rsvpStartTime) / 1000;
            if (elapsedSec < rampSeconds) {
                const t = elapsedSec / rampSeconds;
                spd = Math.round(startSpeed + (targetSpeed - startSpeed) * t);
            }
        }
        document.getElementById('rsvp-focus-wpm').textContent = Math.round(spd);
        const delay = 60000 / spd;
        // Longer pause on punctuation
        const word = rsvpWords[rsvpIdx - 1] || '';
        const extra = /[.!?,;:]$/.test(word) ? delay * 0.5 : 0;
        rsvpTimer = setTimeout(rsvpTick, delay + extra);
    }
    function updateProgress() {
        const pct = rsvpWords.length ? (rsvpIdx / rsvpWords.length) * 100 : 0;
        document.getElementById('rsvp-focus-fill').style.width = pct + '%';
    }
    function updateStartSpeed(v) {
        startSpeed = parseInt(v);
        document.getElementById('start-speed-val').textContent = v + ' WPM';
        // Clamp target to be >= start
        if (parseInt(v) > targetSpeed) {
            targetSpeed = parseInt(v);
            document.getElementById('target-speed-slider').value = v;
            document.getElementById('target-speed-val').textContent = v + ' WPM';
        }
    }
    function updateTargetSpeed(v) {
        targetSpeed = parseInt(v);
        document.getElementById('target-speed-val').textContent = v + ' WPM';
        // Clamp start to be <= target
        if (parseInt(v) < startSpeed) {
            startSpeed = parseInt(v);
            document.getElementById('start-speed-slider').value = v;
            document.getElementById('start-speed-val').textContent = v + ' WPM';
        }
    }
    function updateRamp(v) {
        rampSeconds = parseInt(v);
        document.getElementById('ramp-val').textContent = v + 's';
    }
    function hexToRgb(hex) {
        const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
        return r + ',' + g + ',' + b;
    }
    function setOrpColor(color) {
        orpColor = color;
        const rgb = hexToRgb(color);
        document.getElementById('rsvp-orp').style.color = color;
        document.getElementById('rsvp-orp').style.textShadow = '0 0 20px rgba(' + rgb + ',0.4)';
        document.getElementById('focus-color-val').textContent = color;
        document.getElementById('focus-color-val').style.color = color;
        document.getElementById('focus-color-picker').value = color;
        // Update focus lines
        document.querySelectorAll('.focus-line').forEach(el => {
            el.style.background = 'linear-gradient(to bottom, transparent, ' + color + ', transparent)';
        });
        // Highlight active swatch
        document.querySelectorAll('.color-swatch').forEach(s => {
            s.classList.toggle('active', s.style.background === color || rgbToHex(s.style.background) === color);
        });
    }
    function rgbToHex(rgb) {
        if (rgb.startsWith('#')) return rgb;
        const m = rgb.match(/\d+/g);
        if (!m) return rgb;
        return '#' + m.slice(0,3).map(x => parseInt(x).toString(16).padStart(2,'0')).join('');
    }

    // Reset
    function resetApp() {
        exitFocusMode(); rawText = ''; renderedHTML = '';
        document.getElementById('paste-input').value = '';
        document.getElementById('url-input').value = '';
        showPanel('input');
    }

    // Toast
    function toast(msg, type) {
        const el = document.getElementById('toast');
        el.textContent = msg; el.className = 'toast ' + (type || 'ok');
        void el.offsetWidth; el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 2500);
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (e.code === 'Space' && mode === 'rsvp' && rsvpWords.length) { e.preventDefault(); rsvpToggle(); }
        else if (e.code === 'Escape' && mode === 'rsvp') exitFocusMode();
        else if (e.code === 'ArrowLeft' && mode === 'rsvp') rsvpJump(-10);
        else if (e.code === 'ArrowRight' && mode === 'rsvp') rsvpJump(10);
    });
</script>
</body>
</html>
